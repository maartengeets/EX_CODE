services:
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - examennet
  
  node-red:
    image: nodered/node-red:3.1.9
    container_name: node-red
    restart: always
    volumes:
      - ./node-red:/data
    ports:
      - "1880:1880"
    networks:
      - examennet
  
  client:
    build: ./client
    container_name: client_wss
    depends_on:
      - mosquitto
    networks:
      - examennet

volumes:
  node-red:

networks:
  examennet:
    driver: bridge